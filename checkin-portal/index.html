<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: 'Roboto', Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #333;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      box-sizing: border-box;
    }
    h1 { margin-top: 0; color: #1C3557; font-size: 24px; }
    p.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }

    select, button {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background-color: #D32F2F;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button:disabled { background-color: #aaa; }

    /* The Ticket View */
    #ticket-view { display: none; margin-top: 20px; }
    #qr-image { width: 250px; height: 250px; margin: 10px auto; border: 4px solid #1C3557; border-radius: 12px; padding: 10px; }
    .ticket-name { font-size: 28px; font-weight: 900; text-transform: uppercase; margin: 15px 0 5px 0; color: #000; }
    .ticket-team { font-size: 18px; font-weight: bold; color: #D32F2F; margin: 0 0 15px 0; }
    .clock { font-family: monospace; font-size: 16px; color: #555; background: #f0f0f0; padding: 8px; border-radius: 6px; display: inline-block; }

    .loading { color: #666; font-style: italic; }
    .footer { margin-top: 30px; font-size: 10px; color: #555; text-align: center; }
  </style>
  <script src="https://unpkg.com/easyqrcodejs@4.6.1/dist/easy.qrcode.min.js"></script>
</head>
<body>
  <div class="container" id="setup-view">
    <h1>MDBF 2026 Pass</h1>
    <p class="subtitle">Select your team and name below.</p>
    <div id="loading-msg" class="loading">Loading waivers...</div>
    <select id="team-select" style="display:none;" onchange="loadNames()">
      <option value="">-> Select Your Team <-</option>
    </select>
    <select id="name-select" style="display:none;">
      <option value="">-> Select Your Name <-</option>
    </select>
    <button id="generate-btn" style="display:none;" onclick="generateTicket()">Get QR Pass</button>
  </div>
  <div class="container" id="ticket-view">
    <div class="clock" id="live-clock">00:00:00</div>
    <div class="ticket-name" id="display-name">ANSON LI</div>
    <div class="ticket-team" id="display-team">TEAM NAME</div>
    <div id="qr-code" style="margin: 15px auto; display: flex; justify-content: center;"></div>
    <p style="font-size: 12px; color: #666; margin-top: 20px;">
      <strong>GATE INSTRUCTIONS:</strong><br>
      Please present this pass along with a matching government-issued photo identification to receive your wristband.
    </p>
  </div>
  <div class="footer">Check-in portal developed for MDBF by Anson Li</div>
  <script>
    let waiverData = {};
    // once loaded, immediately ask Google for data
    // handle errors if the data fails to load
    function handleWaiverError(error) {
      console.error('Waiver load failed:', error);
      const loadingMsg = document.getElementById('loading-msg');
      if (loadingMsg) {
        const message = error && error.message ? error.message : 'Unable to load waivers. Please try again later.';
        loadingMsg.textContent = message;
        loadingMsg.style.color = '#c00';
      }
      const teamSelect = document.getElementById('team-select');
      const nameSelect = document.getElementById('name-select');
      const generateBtn = document.getElementById('generate-btn');
      if (teamSelect) teamSelect.style.display = 'none';
      if (nameSelect) nameSelect.style.display = 'none';
      if (generateBtn) generateBtn.style.display = 'none';
      waiverData = {};
    }
    window.onload = () => {
      google.script.run.withSuccessHandler(populateTeams)
        .withFailureHandler(handleWaiverError)
        .getSheetData();
      startClock();
    }
    // fill the first dropdown
    function populateTeams(data) {
      waiverData = data || {};
      const teamSelect = document.getElementById('team-select');
      if (!teamSelect) return;
      // clear existing options
      teamSelect.innerHTML = '<option value="">-> Select Your Team <-</option>';
      const teams = Object.keys(waiverData).sort((a, b) => a.localeCompare(b));
      if (teams.length === 0) {
        handleWaiverError({ message: 'No waiver teams were found. Check that Code.gs is pointed at the waiver response spreadsheet/tab and that the Team, First Name, and Last Name columns contain responses.' });
        return;
      }
      teams.forEach(team => {
        let opt = document.createElement('option');
        opt.value = team;
        opt.textContent = team;
        teamSelect.appendChild(opt);
      });
      document.getElementById('loading-msg').style.display = 'none';
      teamSelect.style.display = 'block';
      document.getElementById('name-select').style.display = 'block';
      document.getElementById('generate-btn').style.display = 'block';
    }
    // fill second dropdown based on team
    function loadNames() {
      const teamSelect = document.getElementById('team-select');
      const nameSelect = document.getElementById('name-select');
      if (!teamSelect || !nameSelect) return;
      const selectedTeam = teamSelect.value;
      // clear existing options
      nameSelect.innerHTML = '<option value="">-> Select Your Name <-</option>';
      if (selectedTeam && waiverData[selectedTeam]) {
        waiverData[selectedTeam].forEach(name => {
          let option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          nameSelect.appendChild(option);
        });
      }
    }
    // generate the ticket
    function generateTicket() {
      const team = document.getElementById('team-select').value;
      const name = document.getElementById('name-select').value;

      if (!team || !name) {
        alert("Please select both your Team and your Name.");
        return;
      }
      // Hide setup, show ticket
      document.getElementById('setup-view').style.display = 'none';
      document.getElementById('ticket-view').style.display = 'block';
      // Populate text
      document.getElementById('display-name').innerText = name;
      document.getElementById('display-team').innerText = team;
      // clear any previous QR code
      document.getElementById('qr-code').innerHTML = '';
      // generate native QR Code with Logo
      const qrOptions = {
        text: `MDBF 2026 - ${name}`,
        width: 250,
        height: 250,
        colorDark : "#1C3557", // MDBF Navy Blue
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H, // MUST be 'H' (High) so the logo doesn't break the scan
        logo: "https://horizons-cdn.hostinger.com/e22d90ec-431c-427c-8f3e-ca594edfa29b/f27fbe95b079b69cee049756ab048b60.png", // Direct link to your logo
        logoWidth: 60,
        logoHeight: 60,
        logoBackgroundColor: '#ffffff',
        logoBackgroundTransparent: false
      };
      // draw on screen
      new QRCode(document.getElementById("qr-code"), qrOptions);
    }
    // live clock
    function startClock() {
      const clockElement = document.getElementById('live-clock');
      if (!clockElement) return;
      setInterval(() => {
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', { hour12: false });
        clockElement.textContent = timeString;
      }, 1000);
    }
  </script>
</body>
</html>
