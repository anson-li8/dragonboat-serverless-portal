<!DOCTYPE html>
<html data-theme="dark">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/easyqrcodejs@4.6.1/dist/easy.qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html[data-theme="dark"] {
      background: radial-gradient(ellipse 80% 60% at 50% -10%, #0d2547 0%, #060e1a 65%);
      color: #dde8f5;
    }

    html[data-theme="light"] {
      background: #f0f3f7;
      color: #0f1d2e;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 32px 16px 40px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: inherit;
      position: relative;
      color: inherit;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 4px;
      color: #7a9ab8;
      font-size: 13px;
      font-weight: 400;
    }

    html[data-theme="light"] .subtitle {
      color: #556677;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-top: 3px;
      user-select: none;
    }

    .theme-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #455d78;
    }

    .toggle-wrap {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 99px;
      background: #1a3050;
      transition: background 150ms ease;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #455d78;
      transition: transform 150ms ease, background 150ms ease;
    }

    .toggle-wrap input:checked + .toggle-track {
      background: #dc2626;
    }

    .toggle-wrap input:checked ~ .toggle-thumb {
      transform: translateX(16px);
      background: #fff;
    }

    .status {
      margin-bottom: 20px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #091a2e;
      color: #6699bb;
      border: 1px solid #1a3050;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
    }

    html[data-theme="light"] .status {
      background: #eef3f8;
      color: #1c3557;
      border-color: #d4dbe6;
    }

    .status.error {
      background: #180808;
      color: #e07070;
      border-color: #4a1010;
    }

    html[data-theme="light"] .status.error {
      background: #fff0f0;
      color: #991818;
      border-color: #eeb8b8;
    }

    .field {
      margin-bottom: 14px;
    }

    .field--hidden {
      display: none !important;
    }

    .field--visible {
      display: block;
      animation: slideDown 300ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #7a9ab8;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    html[data-theme="light"] label {
      color: #556677;
    }

    select {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      background: #091526;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #dde8f5;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    html[data-theme="light"] select {
      background: #ffffff;
      border-color: #b8c4d2;
      color: #0f1d2e;
    }

    select:focus {
      border-color: #dc2626;
      outline: none;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.18);
    }

    select:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-wrap {
      margin-top: 4px;
    }

    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.35);
      transition: all 200ms ease;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 6px 28px rgba(220, 38, 38, 0.5);
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #ticket-view {
      display: none;
    }

    #ticket-view.visible {
      display: block;
      animation: ticketEnter 480ms cubic-bezier(0.34, 1.46, 0.64, 1) both;
    }

    @keyframes ticketEnter {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    #ticket-view {
      position: relative;
      overflow: hidden; /* Keeps the shine inside the card */
    }

    /* The Holographic Shine Effect */
    #ticket-view::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        to bottom right,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.05) 40%,
        rgba(255, 255, 255, 0.2) 50%,
        rgba(255, 255, 255, 0.05) 60%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: rotate(30deg) translateY(-100%);
      animation: shine 4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none; /* Lets you click through it */
    }

    @keyframes shine {
      0% { transform: rotate(30deg) translateY(-100%); }
      100% { transform: rotate(30deg) translateY(100%); }
    }

    .card {
      width: 100%;
      position: relative; z-index: 1;
      max-width: 400px;
      margin: 0 auto 12px;
      border-radius: 16px;
      padding: 28px 24px 24px;
      background: rgba(13, 27, 46, 0.7); /* Transparent background */
      backdrop-filter: blur(12px); /* The magic frosted glass blur */
      -webkit-backdrop-filter: blur(12px); /* Safari support */
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    #ticket-view.visible {
    border-color: rgba(220, 38, 38, 0.25);
    box-shadow: 0 0 40px rgba(220, 38, 38, 0.08), 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(220,38,38,0.15);
  }

    html[data-theme="light"] .card {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }

    .ticket-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .ticket-event-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #455d78;
    }

    html[data-theme="light"] .ticket-event-label {
      color: #556677;
    }

    .clock {
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 13px;
      color: #455d78;
      background: #0f2040;
      border: 1px solid #1a3050;
      padding: 4px 10px;
      border-radius: 6px;
    }

    html[data-theme="light"] .clock {
      color: #1c3557;
      background: #eef3f8;
      border-color: #d4dbe6;
    }

    .divider {
      height: 1px;
      background: #1a3050;
      margin: 0 0 20px;
    }

    .ticket-name {
      font-size: clamp(28px, 9vw, 40px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .ticket-team {
      font-size: 15px;
      font-weight: 600;
      color: #dc2626;
      text-shadow: 0 0 24px rgba(220, 38, 38, 0.45);
      margin-bottom: 22px;
    }

    #qr-code {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    #qr-code canvas,
    #qr-code img {
      display: block;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .ticket-note {
      border-top: 1px solid #1a3050;
      padding-top: 14px;
      color: #7a9ab8;
      font-size: 12px;
      line-height: 1.65;
    }

    html[data-theme="light"] .ticket-note {
      color: #556677;
      border-color: #d4dbe6;
    }

    .footer {
      max-width: 400px;
      margin: 0 auto;
      padding-top: 10px;
      color: #7a9ab8;
      font-size: 12px;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 8px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="card" id="setup-view">
    <div class="card-header">
      <div>
        <h1>Milwaukee Dragon Boat Festival 2026</h1>
        <p class="subtitle">Racer check-in</p>
      </div>
      <div class="theme-toggle" title="Switch theme">
        <span class="theme-label">Dark</span>
        <label class="toggle-wrap" aria-label="Toggle light mode">
          <input type="checkbox" id="theme-toggle-input" onchange="toggleTheme(this)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="theme-label">Light</span>
      </div>
    </div>
    <div id="status-msg" class="status">Loading waiver list…</div>
    <div class="field field--hidden" id="field-team">
      <label for="team-select">Team</label>
      <select id="team-select" onchange="loadNames()" disabled>
        <option value="">Select your team</option>
      </select>
    </div>
    <div class="field field--hidden" id="field-name">
      <label for="name-select">Name</label>
      <select id="name-select" onchange="onNameChange()" disabled>
        <option value="">Select your name</option>
      </select>
    </div>
    <div class="btn-wrap field--hidden" id="field-btn">
      <button id="generate-btn" onclick="generateTicket()" disabled>
        Get my pass →
      </button>
    </div>
  </main>
  <section class="card" id="ticket-view">
    <div class="ticket-meta">
      <div class="ticket-event-label">Milwaukee Dragon Boat Festival</div>
      <div class="clock" id="live-clock">00:00:00</div>
    </div>
    <div class="divider"></div>
    <div class="ticket-name" id="display-name"></div>
    <div class="ticket-team" id="display-team"></div>
    <div id="qr-code"></div>
    <div class="ticket-note">
      <strong>At the gate:</strong> show this pass alongside a government-issued
      photo ID to receive your wristband.
    </div>
  </section>
  <div class="footer">
    MDBF 2026 Check-in <br>
    Developed by Anson. Good luck!
  </div>
  <script>
    var statusMsg = document.getElementById('status-msg');
    var teamSelect = document.getElementById('team-select');
    var nameSelect = document.getElementById('name-select');
    var generateBtn = document.getElementById('generate-btn');
    var setupView = document.getElementById('setup-view');
    var ticketView = document.getElementById('ticket-view');
    var displayName = document.getElementById('display-name');
    var displayTeam = document.getElementById('display-team');
    var qrCode = document.getElementById('qr-code');
    var waiverData = {};

    window.onload = function () {
      startClock();
      loadWaiverList();
    };

    function toggleTheme(checkbox) {
      document.documentElement.setAttribute('data-theme', checkbox.checked ? 'light' : 'dark');
    }

    function loadWaiverList() {
      setStatus('Loading waiver list…', false);
      if (!window.google || !window.google.script || !window.google.script.run) {
        handleError({ message: 'Open this page from the deployed check-in link.' });
        return;
      }
      google.script.run.withSuccessHandler(populateTeams).withFailureHandler(handleError).getSheetData();
    }

    function populateTeams(data) {
      waiverData = data || {};
      clearSelect(teamSelect, 'Select your team');
      clearSelect(nameSelect, 'Select your name');

      var teams = [];
      for (var team in waiverData) {
        if (waiverData.hasOwnProperty(team)) {
          teams.push(team);
        }
      }
      teams.sort();

      if (!teams.length) {
        handleError({ message: 'No teams found. Ask check-in staff for help.' });
        return;
      }

      for (var i = 0; i < teams.length; i++) {
        addOption(teamSelect, teams[i], teams[i]);
      }

      setStatus(teams.length + ' team' + (teams.length === 1 ? '' : 's') + ' loaded.', false);
      teamSelect.disabled = false;
      show('field-team');
      hide('field-name');
      hide('field-btn');
    }

    function loadNames() {
      var team = teamSelect.value;
      clearSelect(nameSelect, 'Select your name');
      if (!team || !waiverData[team]) {
        nameSelect.disabled = true;
        hide('field-name');
        hide('field-btn');
        return;
      }
      var list = waiverData[team];
      for (var i = 0; i < list.length; i++) {
        addOption(nameSelect, list[i], list[i]);
      }
      nameSelect.disabled = false;
      show('field-name');
      generateBtn.disabled = true;
      hide('field-btn');
    }

    function onNameChange() {
      var enabled = teamSelect.value && nameSelect.value;
      generateBtn.disabled = !enabled;
      if (enabled) {
        show('field-btn');
      } else {
        hide('field-btn');
      }
    }

    function generateTicket() {
      var team = teamSelect.value;
      var name = nameSelect.value;
      if (!team || !name) {
        setStatus('Select both a team and a name first.', true);
        return;
      }
      
      // Smooth fade out
      setupView.style.transition = 'opacity 0.3s ease';
      setupView.style.opacity = '0';
      
      setTimeout(function() {
        setupView.style.display = 'none';
        ticketView.style.display = 'block';
        if (ticketView.classList) {
          ticketView.classList.add('visible');
        }
        
        // ... rest of your QR code generation code stays the exact same!
        displayName.textContent = name;
        displayTeam.textContent = team;
        qrCode.innerHTML = '';
        qrCode.innerHTML = '';
        new QRCode(qrCode, {
          text: 'MDBF 2026 | ' + name + ' | ' + team,
          width: 220,
          height: 220,
          colorDark: '#1C3557',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H,
          logo: 'https://horizons-cdn.hostinger.com/e22d90ec-431c-427c-8f3e-ca594edfa29b/f27fbe95b079b69cee049756ab048b60.png',
          logoWidth: 90,
          logoHeight: 45,
          logoBackgroundColor: '#ffffff',
          logoBackgroundTransparent: false
        });
      }, 300);
    }

    function handleError(error) {
      var msg = 'Could not load waiver list. Ask check-in staff for help.';
      if (error && error.message) {
        msg = error.message;
      }
      setStatus(msg, true);
      waiverData = {};
      clearSelect(teamSelect, 'Select your team');
      clearSelect(nameSelect, 'Select your name');
      teamSelect.disabled = true;
      hide('field-name');
      hide('field-btn');
    }

    function show(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('field--hidden');
      el.classList.add('field--visible');
    }

    function hide(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('field--visible');
      el.classList.add('field--hidden');
    }

    function setStatus(message, isError) {
      statusMsg.textContent = message;
      statusMsg.className = isError ? 'status error' : 'status';
    }

    function clearSelect(select, placeholder) {
      select.innerHTML = '';
      addOption(select, '', placeholder);
    }

    function addOption(select, value, text) {
      var option = document.createElement('option');
      option.value = value;
      option.textContent = text;
      select.appendChild(option);
    }

    function startClock() {
      var clock = document.getElementById('live-clock');
      if (!clock) return;
      function update() {
        clock.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
      }
      update();
      setInterval(update, 1000);
    }
  </script>
</body>
</html>
