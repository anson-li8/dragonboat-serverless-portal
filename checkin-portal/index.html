<!DOCTYPE html>
<html>
<head>
  <base target="_top">
</head>
<body>
  <div class="container" id="setup-view">
    <h1>MDBF 2026 Pass</h1>
    <p class="subtitle">Select your team and name below.</p>
    <div id="loading-msg" class="loading">Loading waivers...</div>
    <select id="team-select" style="display:none;" onchange="loadNames()">
      <option value="">-> Select Your Team <-</option>
    </select>
    <select id="name-select" style="display:none;">
      <option value="">-> Select Your Name <-</option>
    </select>    
    <button id="generate-btn" style="display:none;" onclick="generateTicket()">Get QR Pass</button>
  </div>
  <div class="container" id="ticket-view">
    <div class="clock" id="live-clock">00:00:00</div>
    <div class="ticket-name" id="display-name">ANSON LI</div>
    <div class="ticket-team" id="display-team">TEAM NAME</div>
    <div id="qr-code" style="margin: 15px auto; display: flex; justify-content: center;"></div>
    <p style="font-size: 12px; color: #666; margin-top: 20px;">
      <strong>GATE INSTRUCTIONS:</strong><br>
      Please present this pass along with a matching government-issued photo identification to receive your wristband.
    </p>
  </div>
  <div class="footer">Check-in portal developed for MDBF by Anson Li</div>
</body>
</html>
