<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root {
      --navy: #1c3557;
      --red: #c62828;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9dee7;
      --paper: #ffffff;
      --page: #f4f6f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 16px;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(28, 53, 87, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      color: var(--navy);
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      text-align: left;
    }

    select,
    button {
      width: 100%;
      min-height: 48px;
      margin: 0 0 16px;
      border-radius: 8px;
      font-size: 16px;
    }

    select {
      padding: 0 12px;
      background: #fff;
      border: 1px solid #bcc5d1;
      color: var(--ink);
    }

    select:disabled {
      background: #f1f3f5;
      color: #8a94a3;
    }

    button {
      border: 0;
      background: var(--red);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #aeb6c2;
      cursor: not-allowed;
    }

    .status {
      margin: 0 0 16px;
      padding: 12px;
      border-radius: 8px;
      background: #eef3f8;
      color: var(--navy);
      font-size: 14px;
      line-height: 1.4;
      text-align: left;
    }

    .status.error {
      background: #fff1f1;
      color: #9f1d1d;
      border: 1px solid #f0b8b8;
    }

    #ticket-view {
      display: none;
      text-align: center;
    }

    .clock {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #eef3f8;
      color: var(--navy);
      font-family: Consolas, Monaco, monospace;
      font-size: 15px;
    }

    .ticket-name {
      margin: 6px 0 4px;
      color: #111827;
      font-size: 26px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .ticket-team {
      margin: 0 0 18px;
      color: var(--red);
      font-size: 17px;
      font-weight: 700;
    }

    #qr-code {
      display: flex;
      justify-content: center;
      margin: 16px auto;
    }

    .instructions {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: left;
    }

    .footer {
      max-width: 420px;
      margin: 18px auto 0;
      color: #7b8490;
      font-size: 11px;
      text-align: center;
    }
  </style>
  <script src="https://unpkg.com/easyqrcodejs@4.6.1/dist/easy.qrcode.min.js"></script>
</head>
<body>
  <main class="container" id="setup-view">
    <h1>MDBF 2026 Check-in</h1>
    <p class="subtitle">Choose your team, then your name.</p>

    <div id="status-msg" class="status">Loading waiver list...</div>

    <label for="team-select">Team</label>
    <select id="team-select" onchange="loadNames()" disabled>
      <option value="">Select team</option>
    </select>

    <label for="name-select">Name</label>
    <select id="name-select" onchange="updateButtonState()" disabled>
      <option value="">Select name</option>
    </select>

    <button id="generate-btn" onclick="generateTicket()" disabled>Create pass</button>
  </main>

  <section class="container" id="ticket-view">
    <div class="clock" id="live-clock">00:00:00</div>
    <div class="ticket-name" id="display-name"></div>
    <div class="ticket-team" id="display-team"></div>
    <div id="qr-code"></div>
    <p class="instructions">
      <strong>Gate instructions:</strong><br>
      Show this pass with a matching government-issued photo ID to receive your wristband.
    </p>
  </section>

  <div class="footer">Check-in portal developed for MDBF by Anson Li</div>

  <script>
    let waiverData = {};

    window.onload = () => {
      startClock();
      loadWaiverList();
    };

    function loadWaiverList() {
      setLoadingState('Loading waiver list...');

      if (!window.google || !google.script || !google.script.run) {
        handleWaiverError({ message: 'This page must be opened from the deployed check-in link.' });
        return;
      }

      google.script.run
        .withSuccessHandler(populateTeams)
        .withFailureHandler(handleWaiverError)
        .getSheetData();
    }

    function populateTeams(data) {
      waiverData = data || {};
      const teams = Object.keys(waiverData).sort((a, b) => a.localeCompare(b));

      resetSelect('team-select', 'Select team');
      resetSelect('name-select', 'Select name');

      if (teams.length === 0) {
        handleWaiverError({ message: 'No teams were found in the waiver list. Please ask check-in staff for help.' });
        return;
      }

      teams.forEach(team => addOption('team-select', team, team));

      setStatus(`Loaded ${teams.length} team${teams.length === 1 ? '' : 's'}.`);
      document.getElementById('team-select').disabled = false;
      document.getElementById('name-select').disabled = true;
      updateButtonState();
    }

    function loadNames() {
      const team = document.getElementById('team-select').value;
      const names = team && waiverData[team] ? waiverData[team] : [];

      resetSelect('name-select', 'Select name');
      names.forEach(name => addOption('name-select', name, name));

      document.getElementById('name-select').disabled = names.length === 0;
      updateButtonState();
    }

    function generateTicket() {
      const team = document.getElementById('team-select').value;
      const name = document.getElementById('name-select').value;

      if (!team || !name) {
        setStatus('Choose both a team and a name before creating a pass.', true);
        return;
      }

      document.getElementById('setup-view').style.display = 'none';
      document.getElementById('ticket-view').style.display = 'block';
      document.getElementById('display-name').textContent = name;
      document.getElementById('display-team').textContent = team;

      const qrContainer = document.getElementById('qr-code');
      qrContainer.innerHTML = '';

      new QRCode(qrContainer, {
        text: `MDBF 2026 - ${name} - ${team}`,
        width: 250,
        height: 250,
        colorDark: '#1C3557',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
        logo: 'https://horizons-cdn.hostinger.com/e22d90ec-431c-427c-8f3e-ca594edfa29b/f27fbe95b079b69cee049756ab048b60.png',
        logoWidth: 60,
        logoHeight: 60,
        logoBackgroundColor: '#ffffff',
        logoBackgroundTransparent: false
      });
    }

    function handleWaiverError(error) {
      console.error('Waiver load failed:', error);
      const message = error && error.message
        ? error.message
        : 'Waiver list could not be loaded. Please ask check-in staff for help.';
      setStatus(message, true);
      waiverData = {};
      resetSelect('team-select', 'Select team');
      resetSelect('name-select', 'Select name');
      document.getElementById('team-select').disabled = true;
      document.getElementById('name-select').disabled = true;
      updateButtonState();
    }

    function setLoadingState(message) {
      setStatus(message, false);
      resetSelect('team-select', 'Select team');
      resetSelect('name-select', 'Select name');
      document.getElementById('team-select').disabled = true;
      document.getElementById('name-select').disabled = true;
      updateButtonState();
    }

    function setStatus(message, isError) {
      const status = document.getElementById('status-msg');
      status.textContent = message;
      status.className = isError ? 'status error' : 'status';
    }

    function resetSelect(id, placeholder) {
      const select = document.getElementById(id);
      select.innerHTML = '';
      addOption(id, '', placeholder);
    }

    function addOption(selectId, value, text) {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = text;
      document.getElementById(selectId).appendChild(option);
    }

    function updateButtonState() {
      const team = document.getElementById('team-select').value;
      const name = document.getElementById('name-select').value;
      document.getElementById('generate-btn').disabled = !team || !name;
    }

    function startClock() {
      const clockElement = document.getElementById('live-clock');
      if (!clockElement) return;

      const updateClock = () => {
        clockElement.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
      };

      updateClock();
      setInterval(updateClock, 1000);
    }
  </script>
</body>
</html>
